name: 每日AI资讯自动推送（含终身去重）
on:
  schedule:
    - cron: '0 1 * * *' # 北京时间每天9:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          persist-credentials: false # 必须设为false，否则无法用token提交
          fetch-depth: 0

      - name: 设置Python 3.10环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装Python依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 生成资讯并推送邮件
        env:
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
          DOUBAO_ENDPOINT_ID: ${{ secrets.DOUBAO_ENDPOINT_ID }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          EMAIL_AUTH_CODE: ${{ secrets.EMAIL_AUTH_CODE }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        run: python news_generator.py

      - name: 提交更新后的去重库回仓库
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add news_blacklist.json
          git add *.md 2>/dev/null || true # 可选：同时归档资讯文件
          git commit -m "feat: 更新去重库（新增今日资讯指纹）" || echo "没有新内容需要提交"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
