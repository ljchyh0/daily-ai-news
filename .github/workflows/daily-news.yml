name: 每日AI资讯自动推送（含终身去重）
on:
  schedule:
    - cron: '0 1 * * *' # 北京时间每天9:00
  workflow_dispatch:

# 核心修改1：给GitHub Actions写入仓库的权限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置Python 3.10环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装Python依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 生成资讯并推送邮件
        env:
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
          DOUBAO_ENDPOINT_ID: ${{ secrets.DOUBAO_ENDPOINT_ID }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          EMAIL_AUTH_CODE: ${{ secrets.EMAIL_AUTH_CODE }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        run: python news_generator.py

      # 核心修改2：只提交去重库，不提交资讯文件（避开文件名乱码问题）
      - name: 仅更新去重库（不提交资讯文件）
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add news_blacklist.json
          git commit -m "feat: 更新去重库（新增今日资讯指纹）" || echo "去重库无变化，无需提交"
          git push
